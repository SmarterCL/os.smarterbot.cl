version: '3.8'

# ============================================
# SMARTEROS v4.3 - ECOSISTEMA UNIFICADO
# Dominio principal: os.smarterbot.store
# ============================================

services:
  # ------------------------------------------
  # BASE DE DATOS
  # ------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: smarter-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: smarter
      POSTGRES_PASSWORD: ${DB_PASSWORD:-SmarterOS2026!}
      POSTGRES_DB: smarter_os
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - smarter-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smarter"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smarter-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - smarter-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------
  # API — Policy Engine (FastAPI)
  # ------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: smarter-api
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./api:/app/api
      - ./config:/app/config
      - /var/lib/smarter:/var/lib/smarter
    environment:
      - DATABASE_URL=postgresql://smarter:${DB_PASSWORD:-SmarterOS2026!}@postgres:5432/smarter_os
      - N8N_URL=http://smarter-n8n:5678
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    ports:
      - "8002:8002"
    command: uvicorn api.main:app --host 0.0.0.0 --port 8002 --reload
    networks:
      - smarter-net
    depends_on:
      - postgres

  # ------------------------------------------
  # BOLT DASHBOARD (Streamlit)
  # ------------------------------------------
  bolt-dashboard:
    image: python:3.12-slim
    container_name: smarter-bolt-dashboard
    restart: unless-stopped
    working_dir: /app
    volumes:
      - /var/www/bolt-dashboard:/app
      - /var/lib/smarter:/var/lib/smarter:ro
    environment:
      - DATABASE_URL=postgresql://smarter:${DB_PASSWORD:-SmarterOS2026!}@postgres:5432/smarter_os
    ports:
      - "8501:8501"
    command:
      - bash
      - -c
      - |
        pip install streamlit plotly pyyaml requests psycopg2-binary > /dev/null 2>&1 &&
        streamlit run app.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true
    networks:
      - smarter-net
    depends_on:
      - postgres

  # ------------------------------------------
  # N8N (Automatización)
  # ------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: smarter-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_SECURE_COOKIE=false
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=smarter_os
      - DB_POSTGRESDB_USER=smarter
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD:-SmarterOS2026!}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - smarter-net
    depends_on:
      - postgres

  # ------------------------------------------
  # DOCLING (Parser Multimodal)
  # ------------------------------------------
  docling:
    image: nginx:alpine
    container_name: smarter-docling
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - docling_cache:/root/.cache
    networks:
      - smarter-net

  # ------------------------------------------
  # TELEGRAM BOT (Centro de Mando)
  # ------------------------------------------
  telegram-bot:
    image: python:3.12-slim
    container_name: smarter-telegram-bot
    restart: unless-stopped
    working_dir: /app
    volumes:
      - /opt/smarter-telegram-bot:/app
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/smarter:/var/lib/smarter:ro
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    command: >
      bash -c "
        pip install python-telegram-bot==20.7 pyyaml requests > /dev/null 2>&1 &&
        python bot.py
      "
    networks:
      - smarter-net
    depends_on:
      - postgres

# ============================================
# CAPA COGNITIVA (v4.3) - STANDBY
# Activate: docker compose --profile cognitive up -d
# ============================================
  bookish:
    build:
      context: .
      dockerfile: Dockerfile.bookish
    container_name: smarter-bookish
    profiles: ["cognitive"]
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./services/bookish:/app
      - bookish_data:/app/chroma_db
    ports:
      - "8004:8000"
    environment:
      - BOOKISH_PORT=8000
      - EMDASH_URL=http://smarter-emdash:8001
    networks:
      - smarter-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  emdash:
    build:
      context: .
      dockerfile: Dockerfile.emdash
    container_name: smarter-emdash
    profiles: ["cognitive"]
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./services/emdash:/app
      - emdash_data:/app/data
    ports:
      - "8005:8001"
    environment:
      - EMDASH_PORT=8001
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    networks:
      - smarter-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ============================================
# VOLÚMENES
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  docling_cache:
    driver: local
  n8n_data:
    driver: local
  bookish_data:
    driver: local
  emdash_data:
    driver: local

# ============================================
# RED
# ============================================
networks:
  smarter-net:
    name: smarter-net
    driver: bridge
