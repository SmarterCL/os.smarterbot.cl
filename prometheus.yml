global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'smarteros-cluster'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'node-metrics'
    static_configs:
      - targets:
          - 'localhost:9100'
          - 'localhost:9256'
