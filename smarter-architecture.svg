<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="rose" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f43f5e"/>
      <stop offset="100%" style="stop-color:#e11d48"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#e2e8f0" font-size="28" font-weight="bold">🧠 SmarterOS v4.3 — Architecture</text>
  <text x="600" y="75" text-anchor="middle" fill="#64748b" font-size="14">Ecosistema Cognitivo Unificado | os.smarterbot.store</text>

  <!-- ===== LAYER 1: INFRASTRUCTURE ===== -->
  <rect x="20" y="100" width="1160" height="120" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="40" y="125" fill="#64748b" font-size="11" font-weight="600" letter-spacing="1">INFRASTRUCTURE</text>

  <!-- Postgres -->
  <rect x="50" y="140" width="160" height="60" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1" filter="url(#shadow)"/>
  <text x="130" y="165" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">🐘 Postgres</text>
  <text x="130" y="185" text-anchor="middle" fill="#60a5fa" font-size="11">Port 5432 · Healthy</text>

  <!-- Redis -->
  <rect x="230" y="140" width="160" height="60" rx="8" fill="#3b1f1f" stroke="#ef4444" stroke-width="1" filter="url(#shadow)"/>
  <text x="310" y="165" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="600">⚡ Redis</text>
  <text x="310" y="185" text-anchor="middle" fill="#f87171" font-size="11">Port 6379 · Healthy</text>

  <!-- n8n -->
  <rect x="410" y="140" width="160" height="60" rx="8" fill="#1f2d3b" stroke="#f97316" stroke-width="1" filter="url(#shadow)"/>
  <text x="490" y="165" text-anchor="middle" fill="#fdba74" font-size="13" font-weight="600">🔄 n8n</text>
  <text x="490" y="185" text-anchor="middle" fill="#fb923c" font-size="11">Port 5678 · Active</text>

  <!-- Telegram Bot -->
  <rect x="590" y="140" width="160" height="60" rx="8" fill="#1f3b2d" stroke="#10b981" stroke-width="1" filter="url(#shadow)"/>
  <text x="670" y="165" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="600">🤖 Telegram Bot</text>
  <text x="670" y="185" text-anchor="middle" fill="#34d399" font-size="11">v4.3 · Auto-action</text>

  <!-- Caddy -->
  <rect x="770" y="140" width="160" height="60" rx="8" fill="#3b3b1f" stroke="#eab308" stroke-width="1" filter="url(#shadow)"/>
  <text x="850" y="165" text-anchor="middle" fill="#fde047" font-size="13" font-weight="600">🔒 Caddy</text>
  <text x="850" y="185" text-anchor="middle" fill="#facc15" font-size="11">TLS DNS-01 · 12 domains</text>

  <!-- Cloudflare -->
  <rect x="950" y="140" width="160" height="60" rx="8" fill="#3b2d1f" stroke="#f59e0b" stroke-width="1" filter="url(#shadow)"/>
  <text x="1030" y="165" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="600">☁️ Cloudflare</text>
  <text x="1030" y="185" text-anchor="middle" fill="#fbbf24" font-size="11">DNS · CDN · Proxy</text>

  <!-- ===== LAYER 2: CORE SERVICES ===== -->
  <rect x="20" y="240" width="1160" height="160" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="40" y="265" fill="#64748b" font-size="11" font-weight="600" letter-spacing="1">CORE SERVICES (v4.2)</text>

  <!-- API / Policy Engine -->
  <rect x="50" y="280" width="220" height="100" rx="10" fill="url(#blue)" filter="url(#shadow)"/>
  <text x="160" y="310" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">🔧 Policy Engine</text>
  <text x="160" y="330" text-anchor="middle" fill="#e0f2fe" font-size="12">Port 8002 · FastAPI</text>
  <text x="160" y="350" text-anchor="middle" fill="#e0f2fe" font-size="11">Incoherencia + Mercado</text>
  <text x="160" y="368" text-anchor="middle" fill="#e0f2fe" font-size="11">/webhook/telegram</text>

  <!-- BOLT Dashboard -->
  <rect x="290" y="280" width="220" height="100" rx="10" fill="url(#green)" filter="url(#shadow)"/>
  <text x="400" y="310" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">🦞 BOLT Dashboard</text>
  <text x="400" y="330" text-anchor="middle" fill="#d1fae5" font-size="12">Port 8501 · Streamlit</text>
  <text x="400" y="350" text-anchor="middle" fill="#d1fae5" font-size="11">Live Logs · Metrics Pro</text>
  <text x="400" y="368" text-anchor="middle" fill="#d1fae5" font-size="11">Bot Control</text>

  <!-- Docling -->
  <rect x="530" y="280" width="220" height="100" rx="10" fill="url(#amber)" filter="url(#shadow)"/>
  <text x="640" y="310" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">📄 Docling</text>
  <text x="640" y="330" text-anchor="middle" fill="#fef3c7" font-size="12">Port 8080 · Nginx</text>
  <text x="640" y="350" text-anchor="middle" fill="#fef3c7" font-size="11">PDF · DOCX · HTML</text>
  <text x="640" y="368" text-anchor="middle" fill="#fef3c7" font-size="11">Document Parser</text>

  <!-- ECU Tuning -->
  <rect x="770" y="280" width="220" height="100" rx="10" fill="url(#rose)" filter="url(#shadow)"/>
  <text x="880" y="310" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">🚗 ECU Tuning</text>
  <text x="880" y="330" text-anchor="middle" fill="#ffe4e6" font-size="12">ecu.smarterbot.store</text>
  <text x="880" y="350" text-anchor="middle" fill="#ffe4e6" font-size="11">Stage 1 · DPF OFF · EGR OFF</text>
  <text x="880" y="368" text-anchor="middle" fill="#ffe4e6" font-size="11">Chat Agent + File Upload</text>

  <!-- EcoCupon -->
  <rect x="1010" y="280" width="150" height="100" rx="10" fill="#1f3b3b" stroke="#14b8a6" stroke-width="1" filter="url(#shadow)"/>
  <text x="1085" y="310" text-anchor="middle" fill="#5eead4" font-size="16" font-weight="bold">🎫 EcoCupon</text>
  <text x="1085" y="330" text-anchor="middle" fill="#99f6e4" font-size="12">Odoo Module</text>
  <text x="1085" y="350" text-anchor="middle" fill="#99f6e4" font-size="11">Kiosk + Flow.cl</text>
  <text x="1085" y="368" text-anchor="middle" fill="#99f6e4" font-size="11">Coupon Generator</text>

  <!-- ===== LAYER 3: COGNITIVE (v4.3) ===== -->
  <rect x="20" y="420" width="1160" height="160" rx="12" fill="#1e293b" stroke="#7c3aed" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="40" y="445" fill="#a78bfa" font-size="11" font-weight="600" letter-spacing="1">COGNITIVE LAYER v4.3 — ACTIVE</text>

  <!-- Bookish -->
  <rect x="100" y="465" width="280" height="95" rx="10" fill="url(#purple)" filter="url(#shadow)"/>
  <text x="240" y="495" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">📚 Bookish</text>
  <text x="240" y="515" text-anchor="middle" fill="#e9d5ff" font-size="13">Port 8009 · Stub Active</text>
  <text x="240" y="535" text-anchor="middle" fill="#e9d5ff" font-size="12">Semantic Memory · Retrieval</text>
  <text x="240" y="553" text-anchor="middle" fill="#e9d5ff" font-size="11">/search · /ingest · /metrics</text>

  <!-- Emdash -->
  <rect x="420" y="465" width="280" height="95" rx="10" fill="url(#blue)" filter="url(#shadow)"/>
  <text x="560" y="495" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">✍️ Emdash</text>
  <text x="560" y="515" text-anchor="middle" fill="#e0f2fe" font-size="13">Port 8010 · Stub Active</text>
  <text x="560" y="535" text-anchor="middle" fill="#e0f2fe" font-size="12">Content Generation · Reasoning</text>
  <text x="560" y="553" text-anchor="middle" fill="#e0f2fe" font-size="11">/generate · /metrics</text>

  <!-- Auto-Action Engine -->
  <rect x="740" y="465" width="200" height="95" rx="10" fill="#1f2d3b" stroke="#f59e0b" stroke-width="1" filter="url(#shadow)"/>
  <text x="840" y="495" text-anchor="middle" fill="#fbbf24" font-size="16" font-weight="bold">🔁 Auto-Action</text>
  <text x="840" y="515" text-anchor="middle" fill="#fde68a" font-size="12">Decision Engine</text>
  <text x="840" y="535" text-anchor="middle" fill="#fde68a" font-size="11">VALID → Confirm</text>
  <text x="840" y="553" text-anchor="middle" fill="#fde68a" font-size="11">SANDBOX → Review · REJECT → Fraud</text>

  <!-- Metrics DB -->
  <rect x="970" y="465" width="190" height="95" rx="10" fill="#1f3b1f" stroke="#22c55e" stroke-width="1" filter="url(#shadow)"/>
  <text x="1065" y="495" text-anchor="middle" fill="#86efac" font-size="16" font-weight="bold">📊 Metrics</text>
  <text x="1065" y="515" text-anchor="middle" fill="#bbf7d0" font-size="12">240 Events · 190 Real</text>
  <text x="1065" y="535" text-anchor="middle" fill="#bbf7d0" font-size="11">10 Users · 29 Decisions</text>
  <text x="1065" y="553" text-anchor="middle" fill="#bbf7d0" font-size="11">13% Conversion · 6.9s RT</text>

  <!-- ===== CONNECTION ARROWS ===== -->
  <!-- Infra → Core -->
  <line x1="310" y1="200" x2="310" y2="280" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="320" y="245" fill="#94a3b8" font-size="10">routes</text>

  <!-- Core → Cognitive -->
  <line x1="160" y1="380" x2="240" y2="465" stroke="#7c3aed" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowP)"/>
  <text x="170" y="430" fill="#a78bfa" font-size="10">context</text>

  <line x1="400" y1="380" x2="560" y2="465" stroke="#7c3aed" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowP)"/>
  <text x="460" y="430" fill="#a78bfa" font-size="10">generate</text>

  <!-- Cognitive → Auto-Action -->
  <line x1="700" y1="510" x2="740" y2="510" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowA)"/>
  <text x="705" y="500" fill="#fbbf24" font-size="10">decide</text>

  <!-- Auto-Action → Telegram -->
  <line x1="840" y1="465" x2="670" y2="200" stroke="#10b981" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowG)"/>

  <!-- ===== FLOW LABELS ===== -->
  <text x="600" y="620" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">
    FLOW: Usuario → Chat → Bookish busca contexto → Emdash genera respuesta → Auto-Action → Telegram → Métricas
  </text>

  <text x="600" y="645" text-anchor="middle" fill="#94a3b8" font-size="12">
    12 Domains · 10 Containers · 105 Files · 8 Commits · All Systems Operational ✅
  </text>

  <!-- Domains -->
  <text x="600" y="700" text-anchor="middle" fill="#64748b" font-size="10">
    os.smarterbot.store · bolt.smarterbot.store · docling.smarterbot.store · bookish.smarterbot.store · emdash.smarterbot.store
  </text>
  <text x="600" y="720" text-anchor="middle" fill="#64748b" font-size="10">
    n8n.smarterbot.store · api.smarterbot.store · ecu.smarterbot.store · os.smarterbot.cl · food.smarterbot.cl · docs.smarterbot.cl
  </text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowP" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowA" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Status badge -->
  <rect x="440" y="820" width="320" height="40" rx="20" fill="#10b981" filter="url(#shadow)"/>
  <text x="600" y="845" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">✅ ALL SYSTEMS OPERATIONAL</text>
</svg>